<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Facturación</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="container">
    <h1>Sistema de Facturación</h1>

    <div class="card">
        <h2>Registrar Trabajador</h2>
        <form>
            <input type="text" placeholder="Nombre" required>
            <input type="text" placeholder="Departamento" required>
            <button type="submit">Guardar</button>
        </form>
    </div>

    <div class="card">
        <h2>Listado</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Departamento</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Juan Pérez</td>
                    <td>Ventas</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
